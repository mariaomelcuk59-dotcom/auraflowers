<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraFlowers - Доставка квітів</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header">
        <h1 class="logo">AURAFlowers</h1>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h2>ЛАСКАВО ПРОСИМО В AuraFlowers - ДЕ КВІТИ ГОВОРЯТЬ СЕРЦЕМ</h2>
        </div>
    </section>

    <section class="about">
        <h3>ПРО НАС</h3>
        <p>Ми команда яка турбується про своїх клієнтів</p>
    </section>

    <section class="features">
        <h3>Чому ми</h3>
        <div class="features-grid">
            <div class="feature-card" onclick="highlightFeature(this)">
                <div class="icon">🚲</div>
                <p>Доставка</p>
            </div>
            <div class="feature-card" onclick="highlightFeature(this)">
                <div class="icon">🎨</div>
                <p>Дизайн</p>
                <img src="design-icon.png" alt="Дизайн">
            </div>
            <div class="feature-card" onclick="highlightFeature(this)">
                <div class="icon">🌸</div>
                <p>Свіжість</p>
            </div>
        </div>
    </section>

    <footer class="footer"></footer>

    <script src="script.js"></script>
</body>
</html>
