<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraFlowers – Спеціальні пропозиції</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1 class="logo">AuraFlowers</h1>
    <h2>Спеціальні пропозиції</h2>
  </header>

  <main>
    <section class="offer">
      <img src="img/bouquet1.jpg" alt="Букет 1">
      <div class="info">
        <p class="price">1001<span>грн</span></p>
        <p class="old-price">1399</p>
      </div>
      <div class="discount">-20%</div>
    </section>

    <section class="offer">
      <img src="img/bouquet2.jpg" alt="Букет 2">
      <div class="info">
        <p class="price">899<span>грн</span></p>
        <p class="old-price">1199</p>
      </div>
      <div class="discount">-20%</div>
    </section>

    <section class="offer">
      <img src="img/bouquet3.jpg" alt="Букет 3">
      <div class="info">
        <p class="price">1432<span>грн</span></p>
        <p class="old-price">1789</p>
      </div>
      <div class="discount">-20%</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
